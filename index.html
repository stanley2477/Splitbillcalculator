<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Bill Calculator Converter</title>
  <style>
    /* Direct Layout Styles to Ensure Zero Loading Latency */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      color: #334155;
      margin: 0;
      padding: 24px 16px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 416px;
      background-color: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      border: 1px solid #f1f5f9;
      padding: 24px;
      box-sizing: border-box;
    }
    .header { margin-bottom: 32px; text-align: center; }
    .header h1 { font-size: 24px; font-weight: 900; color: #0f172a; margin: 0 0 4px 0; letter-spacing: -0.5px; }
    .header p { font-size: 12px; color: #94a3b8; margin: 0; font-weight: 500; }
    section { margin-bottom: 28px; }
    h2 { font-size: 18px; font-weight: 800; color: #0f172a; margin: 0 0 16px 0; letter-spacing: -0.3px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input, select {
      width: 100%;
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      outline: none;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    input:focus, select:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
    .grid-5 { display: grid; grid-template-cols: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .pct-box { text-align: center; }
    .pct-box span { font-size: 10px; font-weight: 900; color: #94a3b8; display: block; margin-bottom: 4px; }
    .pct-box input { text-align: center; padding: 10px 4px; font-size: 12px; }
    
    /* Strong Blue Action Buttons */
    .btn-action {
      width: 100%;
      background-color: #2563eb;
      color: #ffffff;
      font-weight: 700;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-action:hover { background-color: #1d4ed8; }
    .btn-action:active { transform: scale(0.99); }
    
    /* Result Display Layouts */
    .result-box { border-radius: 16px; padding: 16px; margin-top: 16px; font-size: 14px; display: none; }
    .blue-res { background-color: #eff6ff; border: 1px solid #dbeafe; color: #1e3a8a; }
    .blue-res span { font-weight: 900; color: #2563eb; font-size: 16px; }
    .slate-res { background-color: #f8fafc; border: 1px solid #e2e8f0; font-size: 12px; color: #1e293b; }
    .row-item { display: flex; justify-content: space-between; padding-bottom: 6px; margin-bottom: 6px; border-bottom: 1px solid rgba(226,232,240,0.6); }
    .row-item:last-child { border: none; margin: 0; padding: 0; }
    .row-item span:last-child { font-weight: 700; font-size: 14px; }
    .green-res { background-color: #ecfdf5; border: 1px solid #d1fae5; color: #064e3b; }
    .green-res span { font-weight: 900; color: #10b981; font-size: 16px; }
  </style>
</head>
<body>

  <div class="card">
    
    <div class="header">
      <h1>Split Bill Calculator</h1>
      <p>Smart, simple calculation tools designed for daily finance.</p>
    </div>

    <!-- 1. SPLIT BILL CONVERTER MODULE -->
    <section>
      <h2>Split Bill</h2>
      <div class="form-group">
        <label>Select Currency Symbol</label>
        <select id="currency">
          <!-- USA First -->
          <option value="$">🇺🇸 USD - US Dollar ($)</option>
          <!-- 4 Foreign Currencies -->
          <option value="£">🇬🇧 GBP - British Pound (£)</option>
          <option value="€">🇪🇺 EUR - Euro (€)</option>
          <option value="C$">🇨🇦 CAD - Canadian Dollar ($)</option>
          <option value="A$">🇦🇺 AUD - Australian Dollar ($)</option>
          <!-- African Currencies -->
          <option value="₦">🇳🇬 NGN - Nigerian Naira (₦)</option>
          <option value="₵">🇬🇭 GHS - Ghanaian Cedi (₵)</option>
          <option value="KSh">🇰🇪 KES - Kenyan Shilling (KSh)</option>
          <option value="R">🇿🇦 ZAR - South African Rand (R)</option>
          <!-- Other Global Currencies -->
          <option value="₹">🇮🇳 INR - Indian Rupee (₹)</option>
          <option value="د.إ">🇦🇪 AED - UAE Dirham (د.إ)</option>
          <option value="¥">🇨🇳 CNY - Chinese Yuan (¥)</option>
          <option value="¥">🇯🇵 JPY - Japanese Yen (¥)</option>
          <option value="R$">🇧🇷 BRL - Brazilian Real (R$)</option>
          <option value="$">🇲🇽 MXN - Mexican Peso ($)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Total Money Amount</label>
        <input id="totalBill" type="number" placeholder="29777" />
      </div>
      <div class="form-group">
        <label>Number of People</label>
        <input id="peopleCount" type="number" placeholder="33" />
      </div>
      
      <!-- Hardcoded Inline Onclick Executor -->
      <button class="btn-action" onclick="runSplitBillConversion(event)">Calculate Split</button>
      
      <div id="splitResult" class="result-box blue-res">
        <p style="margin:0 0 4px 0;">Each Person Pays: <span id="perPersonText"></span></p>
        <p style="margin:0; font-size:12px; font-weight:500;">Remainder Left Over: <span id="remainderText" style="font-size:12px; font-weight:700; color:#1e3a8a;"></span></p>
      </div>
    </section>

    <!-- 2. PERCENTAGE SHARE CONVERTER MODULE -->
    <section>
      <h2>📊 Define Percentage Cut Per Person (%)</h2>
      <div class="form-group">
        <label>Total Amount to Share</label>
        <input id="shareTotal" type="number" placeholder="Example: 100000" />
      </div>
      <div class="form-group">
        <label>Percentages Per Person (Must Sum to 100% Total)</label>
        <div class="grid-5">
          <div class="pct-box"><span>P1 %</span><input id="p1" type="number" value="10" /></div>
          <div class="pct-box"><span>P2 %</span><input id="p2" type="number" value="20" /></div>
          <div class="pct-box"><span>P3 %</span><input id="p3" type="number" value="30" /></div>
          <div class="pct-box"><span>P4 %</span><input id="p4" type="number" value="20" /></div>
          <div class="pct-box"><span>P5 %</span><input id="p5" type="number" value="20" /></div>
        </div>
      </div>
      
      <!-- Hardcoded Inline Onclick Executor -->
      <button class="btn-action" onclick="runPercentageCutConversion(event)">Calculate Share Breakdown</button>
      
      <div id="shareResult" class="result-box slate-res" style="flex-direction:column; gap:6px;"></div>
    </section>

    <!-- 3. DISCOUNT FINDER CONVERTER MODULE -->
    <section style="margin-bottom:0;">
      <h2>🏷️ Product Discount Finder</h2>
      <div class="form-group">
        <label>Original Product Price</label>
        <input id="originalPrice" type="number" placeholder="Example: 15000" />
      </div>
      <div class="form-group">
        <label>Discount Percentage (%)</label>
        <input id="discountPercent" type="number" placeholder="Example: 15" />
      </div>
      
      <!-- Hardcoded Inline Onclick Executor -->
      <button class="btn-action" onclick="runDiscountConversion(event)">Calculate Discount</button>
      
      <div id="discountResult" class="result-box green-res">
        <p style="margin:0 0 4px 0;">Final Sale Price: <span id="finalPriceText"></span></p>
        <p style="margin:0; font-size:12px; font-weight:500;">Total Money Saved: <span id="savedAmountText" style="font-size:12px; font-weight:700; color:#064e3b;"></span></p>
      </div>
    </section>

  </div>

  <!-- Direct Execution Engine -->
  <script>
    function runSplitBillConversion(event) {
      // Force block any hidden page resets
      if(event) { event.preventDefault(); event.stopPropagation(); }
      
      var symbol = document.getElementById('currency').value;
      var billInput = document.getElementById('totalBill').value;
      var peopleInput = document.getElementById('peopleCount').value;
      
      if (!billInput || !peopleInput) {
        alert("Please enter both the Total Money Amount and the Number of People.");
        return false;
      }

      var bill = parseFloat(billInput);
      var people = parseInt(peopleInput);

      if (people <= 0) {
        alert("Number of people must be greater than 0.");
        return false;
      }

      var perPerson = Math.floor((bill / people) * 100) / 100;
      var distributed = perPerson * people;
      var remainder = Math.round((bill - distributed) * 100) / 100;

      document.getElementById('perPersonText').innerText = symbol + perPerson.toLocaleString(undefined, {minimumFractionDigits: 2});
      document.getElementById('remainderText').innerText = symbol + remainder.toFixed(2);
      document.getElementById('splitResult').style.display = 'block';
      return false;
    }

    function runPercentageCutConversion(event) {
      // Force block any hidden page resets
      if(event) { event.preventDefault(); event.stopPropagation(); }
      
      var symbol = document.getElementById('currency').value;
      var totalInput = document.getElementById('shareTotal').value;
      
      if (!totalInput) {
        alert("Please enter the Total Amount to Share.");
        return false;
      }

      var total = parseFloat(totalInput);
      var p1 = parseInt(document.getElementById('p1').value) || 0;
