<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Bill Calculator</title>
  <!-- Tailwind CSS CDN for styling -->
  <script src="https://jsdelivr.net"></script>
</head>
<body class="min-h-screen bg-slate-50 py-6 px-4 text-slate-800 antialiased font-sans">

  <div class="max-w-md mx-auto bg-white rounded-[32px] shadow-xl border border-slate-100 p-6 space-y-8">
    
    <!-- Main Header Block -->
    <div class="text-center space-y-1">
      <h1 class="text-2xl font-black text-blue-950 tracking-tight">Split Bill Calculator</h1>
      <p class="text-xs text-slate-400 font-medium px-4 leading-normal">
        Smart, simple calculation tools designed for daily finance.
      </p>
    </div>

    <!-- 1. SPLIT BILL COMPONENT -->
    <section class="space-y-4">
      <h2 class="text-xl font-extrabold text-slate-900 tracking-tight">Split Bill</h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">
            Select Currency Symbol
          </label>
          <select id="currency" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all">
            <option value="₦">🇳🇬 NGN - Nigerian Naira (₦)</option>
            <option value="$">🇺🇸 USD - US Dollar ($)</option>
            <option value="£">🇬🇧 GBP - British Pound (£)</option>
            <option value="€">🇪🇺 EUR - Euro (€)</option>
            <option value="C$">🇨🇦 CAD - Canadian Dollar ($)</option>
            <option value="A$">🇦🇺 AUD - Australian Dollar ($)</option>
            <option value="R">🇿🇦 ZAR - South African Rand (R)</option>
            <option value="₵">🇬🇭 GHS - Ghanaian Cedi (₵)</option>
            <option value="KSh">🇰🇪 KES - Kenyan Shilling (KSh)</option>
            <option value="₹">🇮🇳 INR - Indian Rupee (₹)</option>
            <option value="د.إ">🇦🇪 AED - UAE Dirham (د.إ)</option>
            <option value="¥">🇨🇳 CNY - Chinese Yuan (¥)</option>
            <option value="¥">🇯🇵 JPY - Japanese Yen (¥)</option>
            <option value="R$">🇧🇷 BRL - Brazilian Real (R$)</option>
            <option value="$">🇲🇽 MXN - Mexican Peso ($)</option>
          </select>
        </div>

        <div>
          <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">
            Total Money Amount
          </label>
          <input id="totalBill" type="number" placeholder="29777" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" required />
        </div>

        <div>
          <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">
            Number of People
          </label>
          <input id="peopleCount" type="number" placeholder="33" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" required />
        </div>

        <button onclick="calculateSplit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl text-sm transition-all shadow-md shadow-blue-200 active:scale-[0.99]">
          Calculate Split
        </button>
      </div>

      <!-- Result Target Box -->
      <div id="splitResult" class="hidden bg-blue-50/60 border border-blue-100 rounded-2xl p-4 text-sm space-y-1">
        <p class="font-semibold text-blue-950">Each Person Pays: <span id="perPersonText" class="font-black text-blue-600 text-base"></span></p>
        <p class="text-xs text-blue-700 font-medium">Remainder Left Over: <span id="remainderText"></span></p>
      </div>
    </section>

    <!-- 2. DEFINE PERCENTAGE CUT COMPONENT -->
    <section class="space-y-4 pt-2">
      <h2 class="text-xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
        📊 Define Percentage Cut Per Person (%)
      </h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">
            Total Amount to Share
          </label>
          <input id="shareTotal" type="number" placeholder="Example: 100000" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" required />
        </div>

        <div>
          <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-2">
            Percentages Per Person (Must Sum to 100% Total)
          </label>
          <div class="grid grid-cols-5 gap-2">
            <div class="text-center space-y-1">
              <span class="text-[10px] font-black text-slate-400 block uppercase">P1 %</span>
              <input id="p1" type="number" value="10" class="pct-input w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-center text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" />
            </div>
            <div class="text-center space-y-1">
              <span class="text-[10px] font-black text-slate-400 block uppercase">P2 %</span>
              <input id="p2" type="number" value="20" class="pct-input w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-center text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" />
            </div>
            <div class="text-center space-y-1">
              <span class="text-[10px] font-black text-slate-400 block uppercase">P3 %</span>
              <input id="p3" type="number" value="30" class="pct-input w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-center text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" />
            </div>
            <div class="text-center space-y-1">
              <span class="text-[10px] font-black text-slate-400 block uppercase">P4 %</span>
              <input id="p4" type="number" value="20" class="pct-input w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-center text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" />
            </div>
            <div class="text-center space-y-1">
              <span class="text-[10px] font-black text-slate-400 block uppercase">P5 %</span>
              <input id="p5" type="number" value="20" class="pct-input w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-center text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" />
            </div>
          </div>
        </div>

        <button onclick="calculatePercentageCut()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl text-sm transition-all shadow-md shadow-blue-200 active:scale-[0.99]">
          Calculate Share Breakdown
        </button>
      </div>

      <!-- Percentage Output Target Box -->
      <div id="shareResult" class="hidden bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-medium space-y-2"></div>
    </section>

    <!-- 3. PRODUCT DISCOUNT FINDER COMPONENT -->
    <section class="space-y-4 pt-2">
      <h2 class="text-xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
        🏷️ Product Discount Finder
      </h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">
            Original Product Price
          </label>
          <input id="originalPrice" type="number" placeholder="Example: 15000" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" required />
        </div>

        <div>
          <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">
            Discount Percentage (%)
          </label>
          <input id="discountPercent" type="number" placeholder="Example: 15" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all" required />
        </div>

        <button onclick="calculateDiscount()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl text-sm transition-all shadow-md shadow-blue-200 active:scale-[0.99]">
          Calculate Discount
        </button>
      </div>

      <!-- Discount Output Target Box -->
      <div id="discountResult" class="hidden bg-emerald-50/60 border border-emerald-100 rounded-2xl p-4 text-sm space-y-1">
        <p class="font-semibold text-emerald-950">Final Sale Price: <span id="finalPriceText" class="font-black text-emerald-600 text-base"></span></p>
        <p class="text-xs text-emerald-700 font-medium">Total Money Saved: <span id="savedAmountText"></span></p>
      </div>
    </section>

  </div>

  <!-- JavaScript Functions to Run Computations -->
  <script>
    function calculateSplit() {
      const symbol = document.getElementById('currency').value;
      const bill = parseFloat(document.getElementById('totalBill').value);
      const people = parseInt(document.getElementById('peopleCount').value);
      
      if (!bill || !people) return;

      const perPerson = Math.floor((bill / people) * 100) / 100;
      const distributed = perPerson * people;
      const remainder = Math.round((bill - distributed) * 100) / 100;

      document.getElementById('perPersonText').innerText = symbol + perPerson.toFixed(2);
      document.getElementById('remainderText').innerText = symbol + remainder.toFixed(2);
