<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Splitter & Percentage Suite</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-title: #0f172a;
            --text-body: #334155;
            --border: #e2e8f0;
            --success-bg: #f0fdf4;
            --success-border: #10b981;
            --success-text: #166534;
            --warning-bg: #fffbeb;
            --warning-text: #78350f;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-body); padding: 20px 15px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 520px; width: 100%; margin: 10px auto; background: var(--card-bg); padding: 30px 24px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        header h1 { color: var(--text-title); font-size: 26px; font-weight: 800; margin-bottom: 6px; text-align: center; }
        header p { color: #64748b; font-size: 14px; margin-bottom: 28px; text-align: center; }
        
        /* FIXED LAYOUT HANGS: Force layout containment blocks so sections never bleed or overlap clicks */
        .section-divider { clear: both; display: block; margin: 35px 0 25px 0; border-top: 2px solid #e2e8f0; height: 1px; width: 100%; }
        section { clear: both; display: block; position: relative; z-index: 10; width: 100%; margin-bottom: 10px; }
        
        .form-group { margin-bottom: 18px; text-align: left; clear: both; }
        .form-row-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; font-size: 13px; text-transform: uppercase; }
        input, select { padding: 14px 16px; font-size: 16px; border-radius: 12px; border: 1px solid var(--border); width: 100%; box-sizing: border-box; background: #fff; color: var(--text-title); }
        .form-row-5 input { padding: 12px 8px; text-align: center; font-size: 14px; }
        
        button.action-btn { 
            display: block;
            padding: 16px; 
            font-size: 16px; 
            border-radius: 12px; 
            border: none; 
            width: 100%; 
            font-weight: 700; 
            cursor: pointer; 
            background-color: var(--primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); 
            transition: background 0.1s, transform 0.05s; 
            -webkit-tap-highlight-color: transparent !important;
            /* CRITICAL FIX: Cut through any invisible structural borders */
            position: relative;
            z-index: 999 !important;
            pointer-events: auto !important;
        }
        button.action-btn:hover { background-color: var(--primary-hover); }
        button.action-btn:active { transform: scale(0.96); opacity: 0.95; }
        
        .result-box { display: none; margin-top: 20px; background: var(--success-bg); border: 1px solid var(--success-border); padding: 20px; border-radius: 16px; text-align: left; clear: both; position: relative; z-index: 50; }
        .result-box h3 { color: var(--success-text); margin-bottom: 14px; font-size: 15px; text-transform: uppercase; text-align: center; border-bottom: 1px dashed rgba(16, 185, 129, 0.3); padding-bottom: 6px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--success-text); font-size: 15px; }
        .result-total { font-size: 22px; font-weight: 800; border-top: 1px dashed #10b981; padding-top: 12px; margin-top: 12px; color: #064e3b; display: flex; justify-content: space-between; }
        
        .warning-notice { display: none; background: var(--warning-bg); border: 1px solid #f59e0b; padding: 12px; border-radius: 12px; font-size: 14px; color: var(--warning-text); margin-bottom: 15px; text-align: center; font-weight: 500; clear: both; }
        footer { margin-top: auto; padding: 24px 0 10px 0; font-size: 13px; color: #64748b; text-align: center; clear: both; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Split Bill Calculator</h1>
            <p>Smart, simple calculation tools designed for daily finance.</p>
        </header>

        <!-- TOOL 1: RESTAURANT BILL SPLITTER -->
        <section>
            <h2>🍕 Restaurant Bill Splitter</h2>
            <div class="form-group">
                <label for="currencySelect">Select Currency Symbol</label>
                <select id="currencySelect">
                    <option value="$">🇺🇸 USD - Dollar ($)</option>
                    <option value="£">🇬🇧 GBP - Pound (£)</option>
                    <option value="€">🇪🇺 EUR - Euro (€)</option>
                    <option value="C$">🇨🇦 CAD - Canadian Dollar (C$)</option>
                    <option value="A$">🇦🇺 AUD - Australian Dollar (A$)</option>
                    <option value="¥">🇯🇵 JPY - Yen (¥)</option>
                    <option value="Fr">🇨🇭 CHF - Franc (Fr)</option>
                    <option value="元">🇨🇳 CNY - Yuan (元)</option>
                    <option value="kr">🇸🇪 SEK - Krona (kr)</option>
                    <option value="NZ$">🇳🇿 NZD - New Zealand Dollar (NZ$)</option>
                    <option value="Mex$">🇲🇽 MXN - Peso (Mex$)</option>
                    <option value="S$">🇸🇬 SGD - Singapore Dollar (S$)</option>
                    <option value="HK$">🇭🇰 HKD - Hong Kong Dollar (HK$)</option>
                    <option value="kr">🇳🇴 NOK - Krone (kr)</option>
                    <option value="₩">🇰🇷 KRW - Won (₩)</option>
                    <option value="TL">🇹🇷 TRY - Lira (TL)</option>
                    <option value="R$">🇧🇷 BRL - Real (R$)</option>
                    <option value="₽">🇷🇺 RUB - Ruble (₽)</option>
                    <option value="Rupiah">🇮🇩 IDR - Rupiah (Rupiah)</option>
                    <option value="RM">🇲🇾 MYR - Ringgit (RM)</option>
                    
                    <!-- MIDDLE COUNTRIES REGIONAL PREFERENCES -->
                    <option value="₦">🇳🇬 NGN - Naira (₦)</option>
                    <option value="₵">🇬🇭 GHS - Cedi (₵)</option>
                    <option value="R">🇿🇦 ZAR - Rand (R)</option>
                    <option value="KSh">🇰🇪 KES - Shilling (KSh)</option>
                    <option value="₹">🇮🇳 INR - Rupee (₹)</option>
                    
                    <option value="🇵🇭">🇵🇭 PHP - Peso (🇵🇭)</option>
                    <option value="฿">🇹🇭 THB - Baht (฿)</option>
                    <option value="zł">🇵🇱 PLN - Zloty (zł)</option>
                    <option value="₪">🇮🇱 ILS - Shekel (₪)</option>
                    <option value="K">🇲🇲 MMK - Kyat (K)</option>
                    <option value="RD$">🇩🇴 DOP - Peso (RD$)</option>
                    <option value="Ft">🇭🇺 HUF - Forint (Ft)</option>
                    <option value="Kč">🇨🇿 CZK - Koruna (Kč)</option>
                    <option value="ل.د">🇱🇾 LYD - Dinar (ل.د)</option>
                    <option value="د.إ">🇦🇪 AED - Dirham (د.إ)</option>
                    <option value="ر.س">🇸🇦 SAR - Riyal (ر.س)</option>
                    <option value="ر.ع">🇴🇲 OMR - Rial (ر.ع)</option>
                    <option value="د.ب">🇧🇭 BHD - Dinar (د.ب)</option>
                    <option value="د.أ">🇯🇴 JOD - Dinar (د.أ)</option>
                    <option value="ل.ل">🇱🇧 LBP - Pound (ل.ل)</option>
                    <option value="ج.م">🇪🇬 EGP - Pound (ج.م)</option>
                    <option value="D">🇬🇲 GMD - Dalasi (D)</option>
                    <option value="FG">🇬🇮 GNF - Franc (FG)</option>
                    <option value="Le">🇸🇱 SLE - Leone (Le)</option>
                    <option value="Sh.so.">🇸🇴 SOS - Shilling (Sh.so.)</option>
                    <option value="UM">🇲🇷 MRU - Ouguiya (UM)</option>
                    <option value="K">🇿🇲 ZMW - Kwacha (K)</option>
                    <option value="P">🇧🇼 BWP - Pula (P)</option>
                    <option value="BZ$">🇧🇿 BZD - Dollar (BZ$)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="totalBill">Restaurant Bill Amount</label>
                <input type="number" id="totalBill" placeholder="Example: 45000">
            </div>
            <div class="form-group">
                <label for="peopleCount">Number of People to Split Bill</label>
                <input type="number" id="peopleCount" placeholder="Example: 4">
            </div>
            <button type="button" class="action-btn" id="btn-split">Calculate Equal Split</button>
            
            <div id="split-results" class="result-box">
                <h3>Calculated Split Breakdown</h3>
                <div id="splitContent"></div>
            </div>
        </section>

        <div class="section-divider"></div>

        <!-- TOOL 2: CUSTOM PERCENTAGE MONEY SHARE SPLITTER -->
        <section>
            <h2>📊 Custom % Money Share Splitter</h2>
            <div class="form-group">
                <label for="shareTotalAmount">Total Amount to Share</label>
                <input type="number" id="shareTotalAmount" placeholder="Example: 100000">
            </div>
            
            <div class="form-group">
                <label>Define Percentage Cut Per Person (%) - Must equal 100%</label>
                <!-- FIXED UP TO 5 COLUMNS -->
                <div class="form-row-5">
                    <div>
