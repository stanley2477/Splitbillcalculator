    <script>
        // AUTOMATIC YEAR SCRIPT

        const apiURL = "https://er-api.com";

        // 1. DYNAMICALLY LOAD 160+ WORLD CURRENCIES INTO ALL DROPDOWNS ON BOOT
        async function initCurrencies() {
            try {
                // Fetch live global symbols from standard base currency
                const response = await fetch(`${apiURL}USD`);
                const data = await response.json();
                
                if (data.result === "success") {
                    const currencyCodes = Object.keys(data.rates);
                    const dropdowns = document.querySelectorAll(".currency-select");
                    
                    dropdowns.forEach((selectElem) => {
                        selectElem.innerHTML = ""; // Clear loader
                        currencyCodes.forEach((code) => {
                            const option = document.createElement("option");
                            option.value = code;
                            option.textContent = code;
                            
                            // Setup natural smart defaults for your specific user groups
                            if(selectElem.id.includes("From") && code === "USD") option.selected = true;
                            if(selectElem.id.includes("To") && code === "NGN") option.selected = true;
                            if(selectElem.id === "splitToCurrency" && code === "USD") option.selected = true;
                            
                            selectElem.appendChild(option);
                        });
                    });
                }
            } catch (err) {
                console.error("Error connecting to live global exchange rates:", err);
            }
        }
